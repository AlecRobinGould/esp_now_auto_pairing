; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/en/latest/projectconf.html

[env:esp32-c3-devkitc-02]
platform = espressif32
board = esp32-c3-devkitc-02
framework = espidf

; Uncomment below to use as external dependency from GitHub:
; lib_deps = 
;     https://github.com/AlecRobinGould/esp_now_auto_pairing-lib.git

monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = esp32_exception_decoder

build_flags = 
	-fpermissive

board_build.mcu = esp32c3

build_src_filter=+<examples/example_main.cpp>